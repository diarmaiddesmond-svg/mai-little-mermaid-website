<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products · Mai Little Mermaid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --cream: #faf6f0; --ink: #1a1410; --sand: #f0e8d8; --sand-dark: #d9cdb8;
    --driftwood: #8b7355; --ocean: #4a7c8e; --ocean-deep: #2d5a6b;
    --seafoam: #a8c5bc; --coral: #c4715a; --gold: #b8943f; --green: #4a7c5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  /* LOGIN */
  #loginScreen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .login-sub  { font-size: 0.72rem; color: var(--driftwood); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3rem; }
  .login-card { background: #fff; border: 1px solid var(--sand-dark); padding: 2.5rem; width: 100%; max-width: 380px; }
  .login-title { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; margin-bottom: 1.8rem; }
  .field { margin-bottom: 1.1rem; }
  .field label { display: block; font-size: 0.67rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--driftwood); margin-bottom: 0.35rem; }
  .field input, .field select {
    width: 100%; padding: 0.75rem; border: 1px solid var(--sand-dark);
    font-family: 'Jost', sans-serif; font-size: 0.88rem; color: var(--ink);
    background: var(--cream); outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--ocean); }
  .btn-login { width: 100%; padding: 0.9rem; background: var(--ocean-deep); color: #fff; border: none; font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 0.4rem; }
  .btn-login:hover { background: var(--ocean); }
  .btn-login:disabled { opacity: 0.5; cursor: default; }
  .login-error { font-size: 0.78rem; color: var(--coral); margin-top: 0.8rem; text-align: center; min-height: 1.2em; }

  /* ADMIN SHELL */
  #adminScreen { display: none; }
  .admin-header { background: var(--ink); color: #fff; padding: 1.1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .admin-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .admin-right { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
  .admin-user { font-size: 0.7rem; color: rgba(255,255,255,0.45); }
  .btn-add { background: var(--seafoam); color: var(--ink); border: none; font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.55rem 1.2rem; cursor: pointer; transition: background 0.2s; }
  .btn-add:hover { background: #8eb8b0; }
  .btn-signout { background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.45rem 0.9rem; cursor: pointer; transition: all 0.2s; }
  .btn-signout:hover { border-color: #fff; color: #fff; }
  .admin-body { padding: 2rem; max-width: 1000px; margin: 0 auto; }

  /* FORM */
  #productForm { display: none; background: #fff; border: 1px solid var(--sand-dark); padding: 2rem; margin-bottom: 2rem; }
  .form-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-grid .full { grid-column: 1 / -1; }
  .grad-picker { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .grad-swatch { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s; flex-shrink: 0; }
  .grad-swatch.selected { border-color: var(--ink); }
  .form-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
  .btn-save { flex: 1; padding: 0.85rem; background: var(--ocean-deep); color: #fff; border: none; font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: var(--ocean); }
  .btn-save:disabled { opacity: 0.5; cursor: default; }
  .btn-cancel { padding: 0.85rem 1.5rem; background: none; border: 1px solid var(--sand-dark); font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--driftwood); cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { border-color: var(--coral); color: var(--coral); }

  /* PRODUCT LIST */
  .list-header { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--driftwood); margin-bottom: 1rem; }
  #productsList { display: flex; flex-direction: column; gap: 0.7rem; }
  .product-row { background: #fff; border: 1px solid var(--sand-dark); display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.1rem; transition: border-color 0.2s; }
  .product-row:hover { border-color: var(--ocean); }
  .product-row.sold { background: var(--sand); }
  .p-swatch { width: 46px; height: 46px; flex-shrink: 0; border-radius: 2px; background-size: cover; background-position: center; }
  .p-info { flex: 1; min-width: 0; }
  .p-name { font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-meta { font-size: 0.7rem; color: var(--driftwood); margin-top: 0.2rem; }
  .p-price { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 300; white-space: nowrap; min-width: 50px; text-align: right; }
  .btn-toggle { padding: 0.5rem 1rem; border: none; font-family: 'Jost', sans-serif; font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-toggle.avail { background: #e6f4ee; color: var(--green); }
  .btn-toggle.avail:hover { background: var(--green); color: #fff; }
  .btn-toggle.sold { background: #faeae6; color: var(--coral); }
  .btn-toggle.sold:hover { background: var(--coral); color: #fff; }
  .btn-edit { background: none; border: 1px solid var(--sand-dark); color: var(--driftwood); font-family: 'Jost', sans-serif; font-size: 0.63rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.5rem 0.8rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-edit:hover { border-color: var(--ocean); color: var(--ocean); }
  .btn-del { background: none; border: none; color: var(--sand-dark); font-size: 1rem; cursor: pointer; padding: 0.3rem; transition: color 0.2s; line-height: 1; flex-shrink: 0; }
  .btn-del:hover { color: var(--coral); }
  .loading { text-align: center; padding: 3rem; font-size: 0.78rem; color: var(--driftwood); letter-spacing: 0.1em; text-transform: uppercase; }

  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--ink); color: #fff; padding: 0.8rem 1.4rem; font-size: 0.78rem; letter-spacing: 0.06em; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  /* SETUP WARNING */
  .setup-warn { background: #fff8e1; border: 1px solid #f5c842; padding: 1rem 1.4rem; margin-bottom: 1.5rem; font-size: 0.82rem; line-height: 1.8; }
  .setup-warn strong { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; }
  .setup-warn code { background: rgba(0,0,0,0.07); padding: 0.1rem 0.4rem; font-size: 0.78rem; }

  @media (max-width: 600px) {
    .admin-body { padding: 1rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .p-price { display: none; }
    .product-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">Mai Little Mermaid</div>
  <div class="login-sub">Product Manager</div>
  <div class="login-card">
    <h1 class="login-title">Sign in</h1>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="signIn()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <div class="admin-logo">Mai Little Mermaid</div>
    <div class="admin-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-add" onclick="openForm()">+ Add Product</button>
      <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="admin-body">

    <div class="setup-warn" id="setupWarn" style="display:none">
      <strong>⚠ Supabase not configured yet</strong>
      Open <code>admin.html</code> and <code>shop.html</code>, replace <code>YOUR_SUPABASE_URL</code>
      and <code>YOUR_SUPABASE_ANON_KEY</code> with your project values from
      <strong>Supabase → Project Settings → API</strong>.
    </div>

    <!-- ADD / EDIT FORM -->
    <div id="productForm">
      <div class="form-title" id="formTitle">Add New Product</div>
      <div class="form-grid">
        <div class="field">
          <label>Product Name *</label>
          <input type="text" id="fName" placeholder="e.g. Seafoam Glass Bracelet">
        </div>
        <div class="field">
          <label>Type *</label>
          <select id="fType">
            <option value="">— choose type —</option>
            <option>Bracelet</option>
            <option>Earrings</option>
            <option>Necklace</option>
            <option>Pendant</option>
            <option>Ring</option>
          </select>
        </div>
        <div class="field">
          <label>Price ($) *</label>
          <input type="number" id="fPrice" placeholder="55" min="1">
        </div>
        <div class="field">
          <label>Metal *</label>
          <select id="fMetal">
            <option value="">— choose metal —</option>
            <option>Gold Fill</option>
            <option>Sterling Silver</option>
            <option>14k Gold</option>
            <option>Rose Gold Fill</option>
          </select>
        </div>
        <div class="field">
          <label>Colour / Description</label>
          <input type="text" id="fColour" placeholder="e.g. Seafoam, Cobalt Blue">
        </div>
        <div class="field">
          <label>Photo URL <span style="font-weight:300;text-transform:none;letter-spacing:0">(paste link to image)</span></label>
          <input type="url" id="fImage" placeholder="https://…">
        </div>
        <div class="field full">
          <label>Colour Swatch <span style="font-weight:300;text-transform:none;letter-spacing:0">(shown if no photo)</span></label>
          <div class="grad-picker" id="gradPicker"></div>
          <input type="hidden" id="fGrad" value="g1">
        </div>
        <div class="field">
          <label>Status</label>
          <select id="fAvailable">
            <option value="true">Available for sale</option>
            <option value="false">Sold out</option>
          </select>
        </div>
        <div class="field">
          <label>Show "New" badge?</label>
          <select id="fNew">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="saveBtn" onclick="saveProduct()">Save Product</button>
        <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      </div>
    </div>

    <div class="list-header" id="listHeader"></div>
    <div id="productsList"><div class="loading">Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG — paste your Supabase values here ──────────────────────────────
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';      // https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // eyJ...
// ─────────────────────────────────────────────────────────────────────────

const GRADS = {
  g1:'linear-gradient(145deg,#c9b99a,#8b7355)', g2:'linear-gradient(145deg,#cdd8d6,#9ab5b0)',
  g3:'linear-gradient(145deg,#ddd0c0,#bfa98e)', g4:'linear-gradient(145deg,#c8d4cc,#8eaaa4)',
  g5:'linear-gradient(145deg,#e4d8c4,#c2a87c)', g6:'linear-gradient(145deg,#d0dbd8,#94b4ae)',
  g7:'linear-gradient(145deg,#e8dcc8,#c49a6a)', g8:'linear-gradient(145deg,#cfd9d5,#7aaa9e)',
};

const configured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
let sb, currentUser, editingId = null;

if (configured) {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ── GRAD PICKER ──────────────────────────────────────────────────────────
function buildGradPicker(selected) {
  document.getElementById('gradPicker').innerHTML =
    Object.entries(GRADS).map(([k, g]) =>
      `<div class="grad-swatch ${k === selected ? 'selected' : ''}"
            style="background:${g}" title="${k}"
            onclick="pickGrad('${k}',this)"></div>`
    ).join('');
}
function pickGrad(k, el) {
  document.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('fGrad').value = k;
}

// ── AUTH ─────────────────────────────────────────────────────────────────
async function signIn() {
  if (!configured) {
    document.getElementById('loginError').textContent = 'Supabase not configured yet.';
    return;
  }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  document.getElementById('loginError').textContent = '';

  const { data, error } = await sb.auth.signInWithPassword({
    email:    document.getElementById('loginEmail').value.trim(),
    password: document.getElementById('loginPassword').value,
  });

  if (error) {
    document.getElementById('loginError').textContent = error.message;
    btn.disabled = false; btn.textContent = 'Sign In';
    return;
  }
  currentUser = data.user;
  enterAdmin();
}

async function signOut() {
  await sb.auth.signOut();
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

async function checkSession() {
  if (!configured) {
    // Show demo mode so the page is visible without Supabase
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('setupWarn').style.display = 'block';
    document.getElementById('adminUser').textContent = 'not connected';
    document.getElementById('listHeader').textContent = 'Demo — connect Supabase to manage real products';
    document.getElementById('productsList').innerHTML = '<div class="loading">No products loaded — Supabase not configured</div>';
    buildGradPicker('g1');
    return;
  }
  const { data } = await sb.auth.getSession();
  if (data.session) { currentUser = data.session.user; enterAdmin(); }
}

function enterAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  document.getElementById('adminUser').textContent = currentUser?.email || '';
  buildGradPicker('g1');
  loadProducts();
}

// ── PRODUCTS ─────────────────────────────────────────────────────────────
async function loadProducts() {
  if (!configured) return;
  const { data, error } = await sb.from('products').select('*').order('created_at');
  if (error) { showToast('Error loading products'); return; }
  renderList(data || []);
}

function renderList(rows) {
  const avail = rows.filter(p => p.available).length;
  document.getElementById('listHeader').textContent =
    `${rows.length} product${rows.length !== 1 ? 's' : ''} · ${avail} available · ${rows.length - avail} sold`;

  if (!rows.length) {
    document.getElementById('productsList').innerHTML = '<div class="loading">No products yet — add your first one above.</div>';
    return;
  }

  document.getElementById('productsList').innerHTML = rows.map(p => {
    const bg = p.image_url
      ? `background:url('${p.image_url}') center/cover`
      : `background:${GRADS[p.grad] || GRADS.g1}`;
    const newBadge = p.is_new ? ' <span style="font-size:0.58rem;background:var(--ocean-deep);color:#fff;padding:0.1rem 0.35rem;margin-left:0.4rem;letter-spacing:0.1em;vertical-align:middle">NEW</span>' : '';
    return `
    <div class="product-row ${p.available ? '' : 'sold'}">
      <div class="p-swatch" style="${bg}"></div>
      <div class="p-info">
        <div class="p-name">${p.name}${newBadge}</div>
        <div class="p-meta">${p.type} · ${p.metal}${p.colour ? ' · ' + p.colour : ''}</div>
      </div>
      <div class="p-price">$${p.price}</div>
      <button class="btn-toggle ${p.available ? 'avail' : 'sold'}"
              onclick="toggleAvail(${p.id}, ${p.available})">
        ${p.available ? '✓ Available' : '✗ Sold Out'}
      </button>
      <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
      <button class="btn-del" onclick="delProduct(${p.id})" title="Delete">✕</button>
    </div>`;
  }).join('');
}

async function toggleAvail(id, current) {
  const { error } = await sb.from('products').update({ available: !current }).eq('id', id);
  if (error) { showToast('Error: ' + error.message); return; }
  showToast(current ? '📦 Marked as Sold Out' : '✓ Marked as Available');
  loadProducts();
}

// ── FORM ─────────────────────────────────────────────────────────────────
function openForm(p) {
  editingId = p?.id || null;
  document.getElementById('formTitle').textContent = p ? 'Edit Product' : 'Add New Product';
  document.getElementById('fName').value      = p?.name      || '';
  document.getElementById('fType').value      = p?.type      || '';
  document.getElementById('fPrice').value     = p?.price     || '';
  document.getElementById('fMetal').value     = p?.metal     || '';
  document.getElementById('fColour').value    = p?.colour    || '';
  document.getElementById('fImage').value     = p?.image_url || '';
  document.getElementById('fGrad').value      = p?.grad      || 'g1';
  document.getElementById('fAvailable').value = String(p?.available ?? true);
  document.getElementById('fNew').value       = String(p?.is_new ?? false);
  buildGradPicker(p?.grad || 'g1');
  document.getElementById('productForm').style.display = 'block';
  document.getElementById('productForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeForm() {
  document.getElementById('productForm').style.display = 'none';
  editingId = null;
}

async function saveProduct() {
  const name  = document.getElementById('fName').value.trim();
  const type  = document.getElementById('fType').value;
  const price = parseInt(document.getElementById('fPrice').value);
  const metal = document.getElementById('fMetal').value;
  if (!name || !type || !price || !metal) { showToast('Fill in Name, Type, Price and Metal'); return; }

  const payload = {
    name, type, price, metal,
    colour:    document.getElementById('fColour').value.trim() || null,
    image_url: document.getElementById('fImage').value.trim()  || null,
    grad:      document.getElementById('fGrad').value,
    available: document.getElementById('fAvailable').value === 'true',
    is_new:    document.getElementById('fNew').value === 'true',
  };

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const op = editingId
    ? sb.from('products').update(payload).eq('id', editingId)
    : sb.from('products').insert(payload);
  const { error } = await op;

  btn.disabled = false; btn.textContent = 'Save Product';
  if (error) { showToast('Error: ' + error.message); return; }
  showToast(editingId ? '✓ Product updated' : '✓ Product added');
  closeForm();
  loadProducts();
}

async function editProduct(id) {
  const { data } = await sb.from('products').select('*').eq('id', id).single();
  if (data) openForm(data);
}

async function delProduct(id) {
  if (!confirm('Delete this product permanently?')) return;
  const { error } = await sb.from('products').delete().eq('id', id);
  if (error) { showToast('Error: ' + error.message); return; }
  showToast('Product deleted');
  loadProducts();
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') signIn();
});

checkSession();
</script>
</body>
</html>
